<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <div class="pill-box">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100">
                <defs>
                    <!-- ========= X方向 ========= -->

                    <!-- 左半円 -->
                    <linearGradient id="leftX" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ff0000" />
                        <stop offset="25%" stop-color="#ff0000" />
                        <stop offset="75%" stop-color="#808080" />
                        <stop offset="100%" stop-color="#808080" />
                    </linearGradient>
                    <linearGradient id="leftY" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#000000" />
                        <stop offset="25%" stop-color="#000000" />
                        <stop offset="75%" stop-color="#00ff00" />
                        <stop offset="100%" stop-color="#00ff00" />
                    </linearGradient>

                    <linearGradient id="rightX" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#808080" />
                        <stop offset="25%" stop-color="#808080" />
                        <stop offset="75%" stop-color="#000000" />
                        <stop offset="100%" stop-color="#000000" />
                    </linearGradient>
                    <linearGradient id="rightY" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#000000" />
                        <stop offset="25%" stop-color="#000000" />
                        <stop offset="75%" stop-color="#00ff00" />
                        <stop offset="100%" stop-color="#00ff00" />
                    </linearGradient>

                    <linearGradient id="pillY" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#000000" />
                        <stop offset="25%" stop-color="#000000" />
                        <stop offset="75%" stop-color="#00ff00" />
                        <stop offset="100%" stop-color="#00ff00" />
                    </linearGradient>
                </defs>

                <rect x="0" y="0" width="100" height="100" fill="url(#leftX)" />
                <rect x="0" y="0" width="100" height="100" fill="url(#leftY)" style="mix-blend-mode: screen"/>
                
                <rect x="100" y="0" width="600" height="100" fill="url(#pillY)" />

                <rect x="600" y="0" width="100" height="100" fill="url(#rightX)" />
                <rect x="600" y="0" width="100" height="100" fill="url(#rightY)" style="mix-blend-mode: screen"/>

                <!-- <rect width="700" height="100" fill="url(#pillY)" style="mix-blend-mode: screen" /> -->
            </svg>
        </div>
    </body>

    <style>
        .pill-box {
            border-radius: 0;
            position: absolute;
            right: 0;
            top: 0;
            display: flex;
            width: 90%;
            height: 100%;
            /* aspect-ratio: 7/1; */
            /* overflow: hidden; */
        }
    </style>
</html>
